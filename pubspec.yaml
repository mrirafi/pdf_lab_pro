name: pdf_lab_pro
description: "All in One PDF Tools App"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.3

  # State Management - Riverpod
  flutter_riverpod: ^3.0.3
  riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Navigation & Routing
  go_router: ^17.0.0

  # File Operations
  file_picker: ^10.3.7
  path_provider: ^2.1.5
  path: ^1.9.0
  mime: ^2.0.0
  vector_math: ^2.2.0
  flutter_tts: ^4.2.3
  scrollable_positioned_list: ^0.3.8
  photo_view: ^0.15.0

  # PDF Manipulation
  pdf: ^3.10.6    # For PDF creation/manipulation
  # pdf_render: ^1.4.0
  pdf_combiner: ^4.4.1


  # Image Processing
  image: ^4.1.7
  image_picker: ^1.1.3

  # File Operations
  open_file: ^3.5.10
  share_plus: ^12.0.1

  # Permissions
  permission_handler: ^12.0.1
 # printing: ^5.14.2
  pdfrx: ^2.2.16
  pdfrx_engine: ^0.3.6

  # Storage
  shared_preferences: ^2.2.2  # Add this for settings

  # Utilities
  uuid: ^4.5.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  riverpod_generator: ^3.0.3
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

#  assets:
#    - assets/icons/
#    - assets/images/
#    - assets/fonts/

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_logo.png
  android_12:
    color: "#ffffff"
    image: assets/images/splash_logo.png
  android: true
  ios: true
  web: false